<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MindAR Video</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #tapLayer {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    #tapButton {
      background: #fff;
      color: #000;
      padding: 20px 30px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
  </style>
</head>

<body>

<div id="tapLayer">
  <div id="tapButton">Tap Anywhere to Start AR</div>
</div>

<a-scene
  mindar-image="imageTargetSrc: poster.mind; autoStart: true;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-assets>
    <video
      id="video"
      src="video.mp4"
      loop
      playsinline
      webkit-playsinline
      crossorigin="anonymous">
    </video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity id="target" mindar-image-target="targetIndex: 0">
    <a-plane id="ar-video" material="src: #video; shader: flat; transparent: true" position="0 0 0"></a-plane>
  </a-entity>

</a-scene>

<script>
  const video = document.getElementById("video");
  const tapLayer = document.getElementById("tapLayer");
  const target = document.getElementById("target");
  const arVideo = document.getElementById("ar-video");

  // Dynamically set aspect ratio when video metadata loads
  video.addEventListener('loadedmetadata', () => {
    const aspectRatio = video.videoWidth / video.videoHeight;
    arVideo.setAttribute('width', 1);
    arVideo.setAttribute('height', 1 / aspectRatio);
  });

  // User tap unlocks the browser's media block
  tapLayer.addEventListener("click", () => {
    tapLayer.style.display = "none";
    // We just unlock it here, but wait for the target to actually play it
  }, { once: true });

  // Play video when target is scanned
  target.addEventListener("targetFound", () => {
    // Force A-frame to update the WebGL texture map
    const material = arVideo.getObject3D('mesh').material;
    if (material.map) material.map.needsUpdate = true;

    video.play().catch(err => console.error("Video play error:", err));
  });

  // Pause when target is lost
  target.addEventListener("targetLost", () => {
    video.pause();
  });
</script>

</body>
</html>

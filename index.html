<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MindAR Video</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #tapLayer {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    #tapButton {
      background: #000;
      color: #fff;
      padding: 26px 32px;
      border-radius: 16px;
      font-size: 20px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    #tapButton span {
      display: block;
      font-size: 42px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<div id="tapLayer">
  <div id="tapButton">
    <span>🔊</span>
    Tap to Enable Sound
  </div>
</div>

<a-scene
  mindar-image="imageTargetSrc: poster.mind; autoStart: true;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-assets>
    <video
      id="video"
      src="video.mp4"
      loop
      muted
      playsinline
      webkit-playsinline
      crossorigin="anonymous">
    </video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity id="target" mindar-image-target="targetIndex: 0">
    <a-video id="ar-video" src="#video" position="0 0 0"></a-video>
  </a-entity>

</a-scene>

<script>
  const video = document.getElementById("video");
  const tapLayer = document.getElementById("tapLayer");
  const target = document.getElementById("target");
  const arVideo = document.getElementById("ar-video");

  // 1. Calculate and set the original resolution size/aspect ratio
  video.addEventListener('loadedmetadata', () => {
    const aspectRatio = video.videoWidth / video.videoHeight;
    // We keep the width relative to the target size (1) and scale the height proportionally
    arVideo.setAttribute('width', 1);
    arVideo.setAttribute('height', 1 / aspectRatio);
  });

  // 2. Unlock sound and video element on mobile browsers
  tapLayer.addEventListener("click", () => {
    video.muted = false;
    
    // Briefly play and pause to unlock media playback rules on iOS/Android
    video.play().then(() => {
      video.pause();
    }).catch(() => {});
    
    tapLayer.style.display = "none";
  }, { once: true });

  // 3. Attach AR tracking events to the target entity, not the document
  target.addEventListener("targetFound", () => {
    video.play().catch(() => {});
  });

  target.addEventListener("targetLost", () => {
    video.pause();
  });
</script>

</body>
</html>
